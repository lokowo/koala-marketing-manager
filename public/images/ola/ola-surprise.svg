<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- Left ear -->
  <circle cx="28" cy="28" r="22" fill="#A39E99"/>
  <circle cx="28" cy="28" r="13" fill="#C4BAB2"/>
  <!-- Right ear -->
  <circle cx="92" cy="28" r="22" fill="#A39E99"/>
  <circle cx="92" cy="28" r="13" fill="#C4BAB2"/>
  <!-- Body -->
  <ellipse cx="60" cy="105" rx="32" ry="28" fill="#A39E99"/>
  <ellipse cx="60" cy="108" rx="20" ry="18" fill="#F5F0E8"/>
  <!-- Head -->
  <circle cx="60" cy="55" r="30" fill="#A39E99"/>
  <ellipse cx="60" cy="60" rx="22" ry="20" fill="#F5F0E8"/>
  <!-- Star eyes -->
  <polygon points="49,54 50.5,50 52,54 56,54 53,57 54,61 49,58 44,61 45,57 42,54" fill="#FFD700"/>
  <polygon points="71,54 72.5,50 74,54 78,54 75,57 76,61 71,58 66,61 67,57 64,54" fill="#FFD700"/>
  <!-- Nose -->
  <ellipse cx="60" cy="63" rx="5" ry="3.5" fill="#1A1A2E"/>
  <!-- O mouth -->
  <ellipse cx="60" cy="71" rx="4" ry="5" fill="#1A1A2E"/>
  <ellipse cx="60" cy="70" rx="2.5" ry="3" fill="#C44040"/>
  <!-- Blush -->
  <circle cx="42" cy="65" r="5" fill="#FFB5B5" opacity="0.6"/>
  <circle cx="78" cy="65" r="5" fill="#FFB5B5" opacity="0.6"/>
  <!-- Arms (slightly raised in surprise) -->
  <path d="M30 90 Q15 80 18 70" stroke="#A39E99" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M90 90 Q105 80 102 70" stroke="#A39E99" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Cap (popping up) -->
  <g transform="translate(0, -8) rotate(-5, 60, 30)">
    <polygon points="35,38 60,28 85,38 60,48" fill="#0D7C5F"/>
    <rect x="55" y="28" width="10" height="4" fill="#0D7C5F"/>
    <rect x="57" y="22" width="6" height="8" fill="#0D7C5F"/>
    <line x1="85" y1="38" x2="92" y2="48" stroke="#FFD700" stroke-width="2"/>
    <circle cx="92" cy="50" r="3" fill="#FFD700"/>
  </g>
</svg>
