<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Left ear -->
  <circle cx="10" cy="12" r="8" fill="#A39E99"/>
  <circle cx="10" cy="12" r="5" fill="#C4BAB2"/>
  <!-- Right ear -->
  <circle cx="38" cy="12" r="8" fill="#A39E99"/>
  <circle cx="38" cy="12" r="5" fill="#C4BAB2"/>
  <!-- Head -->
  <circle cx="24" cy="25" r="14" fill="#A39E99"/>
  <!-- Face patch -->
  <ellipse cx="24" cy="27" rx="10" ry="9.5" fill="#F5F0E8"/>
  <!-- Left eye -->
  <circle cx="19" cy="25" r="2.2" fill="#1A1A2E"/>
  <circle cx="19.8" cy="24.2" r="0.7" fill="#FFFFFF"/>
  <!-- Right eye -->
  <circle cx="29" cy="25" r="2.2" fill="#1A1A2E"/>
  <circle cx="29.8" cy="24.2" r="0.7" fill="#FFFFFF"/>
  <!-- Nose -->
  <ellipse cx="24" cy="29.5" rx="2.5" ry="1.8" fill="#1A1A2E"/>
  <!-- Smile -->
  <path d="M21 32 Q24 34.5 27 32" stroke="#1A1A2E" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  <!-- Blush -->
  <circle cx="16" cy="30" r="2" fill="#FFB5B5" opacity="0.5"/>
  <circle cx="32" cy="30" r="2" fill="#FFB5B5" opacity="0.5"/>
  <!-- Graduation cap -->
  <polygon points="13,17 24,12 35,17 24,22" fill="#0D7C5F"/>
  <rect x="22" y="12" width="4" height="2" fill="#0D7C5F"/>
  <rect x="22.5" y="9" width="3" height="4" fill="#0D7C5F"/>
  <!-- Tassel -->
  <line x1="35" y1="17" x2="38" y2="21" stroke="#FFD700" stroke-width="1"/>
  <circle cx="38" cy="22" r="1.5" fill="#FFD700"/>
</svg>
